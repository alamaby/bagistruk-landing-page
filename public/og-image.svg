<?xml version="1.0" encoding="UTF-8"?>
<!--
  og-image.svg - Source file for the BagiStruk Open Graph image.

  Spec: 1200x630 (Facebook / Twitter / LinkedIn standard).
  Use: After exporting to PNG, point og:image and twitter:image to
       /og-image.png in index.html and src/App.tsx.

  How to convert to PNG:

    1) Manual via browser (no install):
       - Open this file in Chrome/Edge.
       - Resize the window to 1200x630.
       - Use a full-page screenshot tool to save the visible area as PNG.

    2) Figma / Inkscape / Sketch:
       - Import the SVG and export a 1200x630 PNG.

  Notes:
    - Uses system-ui / sans-serif. For pixel-perfect rendering, replace
      font-family with a webfont (e.g. Inter) and re-export.
    - References public/app-logo.png for the brand mark; ensure the
      file is in the same directory at conversion time.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdfa" />
      <stop offset="100%" stop-color="#ccfbf1" />
    </linearGradient>
    <linearGradient id="phoneScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <filter id="phoneShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" />
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative blurred shapes (teal + indigo accents) -->
  <circle cx="1100" cy="80" r="200" fill="#14b8a6" opacity="0.22" />
  <circle cx="900" cy="600" r="180" fill="#6366f1" opacity="0.18" />

  <!-- Brand mark + wordmark (left) -->
  <image href="app-logo.png" x="80" y="80" width="100" height="100" />
  <text x="200" y="155" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="60" font-weight="800" fill="#0f172a">BagiStruk</text>

  <!-- Main headline (two lines, second line in brand teal) -->
  <text x="80" y="295" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="76" font-weight="800" fill="#0f172a">Split bills from</text>
  <text x="80" y="385" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="76" font-weight="800" fill="#0d9488">receipt photos.</text>

  <!-- Value props (single line for compactness) -->
  <text x="80" y="450" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="500" fill="#475569">Multi-photo OCR, Item-level split, Settlement tracking</text>

  <!-- Domain -->
  <text x="80" y="555" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" fill="#0d9488">bagistruk.vercel.app</text>

  <!-- Phone mockup (right) -->
  <g transform="translate(780, 60)">
    <!-- Soft shadow under phone -->
    <rect x="8" y="22" width="280" height="510" rx="48" fill="#0f172a" opacity="0.18" filter="url(#phoneShadow)" />
    <!-- Phone body -->
    <rect x="0" y="0" width="280" height="510" rx="48" fill="#0f172a" />
    <!-- Screen -->
    <rect x="14" y="14" width="252" height="482" rx="36" fill="url(#phoneScreen)" />
    <!-- Notch -->
    <rect x="105" y="14" width="70" height="22" rx="11" fill="#0f172a" />

    <!-- Status bar -->
    <text x="40" y="60" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="white" opacity="0.7">9:41</text>

    <!-- Receipt (slightly rotated) -->
    <g transform="translate(50, 100) rotate(-3 100 130)">
      <rect x="0" y="0" width="200" height="260" rx="8" fill="white" />
      <rect x="20" y="22" width="80" height="10" rx="2" fill="#cbd5e1" />
      <rect x="20" y="38" width="50" height="6" rx="2" fill="#e2e8f0" />
      <line x1="15" y1="58" x2="185" y2="58" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3" />
      <rect x="20" y="70" width="100" height="6" rx="2" fill="#e2e8f0" />
      <rect x="150" y="70" width="30" height="6" rx="2" fill="#e2e8f0" />
      <rect x="20" y="86" width="80" height="6" rx="2" fill="#e2e8f0" />
      <rect x="150" y="86" width="30" height="6" rx="2" fill="#e2e8f0" />
      <rect x="20" y="102" width="110" height="6" rx="2" fill="#e2e8f0" />
      <rect x="150" y="102" width="30" height="6" rx="2" fill="#e2e8f0" />
      <rect x="20" y="118" width="70" height="6" rx="2" fill="#e2e8f0" />
      <rect x="150" y="118" width="30" height="6" rx="2" fill="#e2e8f0" />
      <rect x="20" y="134" width="90" height="6" rx="2" fill="#e2e8f0" />
      <rect x="150" y="134" width="30" height="6" rx="2" fill="#e2e8f0" />
      <line x1="15" y1="160" x2="185" y2="160" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3" />
      <rect x="20" y="174" width="40" height="10" rx="2" fill="#94a3b8" />
      <rect x="140" y="174" width="40" height="10" rx="2" fill="#0d9488" />
      <rect x="20" y="200" width="60" height="6" rx="2" fill="#cbd5e1" />
      <rect x="150" y="200" width="30" height="6" rx="2" fill="#cbd5e1" />
      <rect x="20" y="214" width="50" height="6" rx="2" fill="#cbd5e1" />
      <rect x="150" y="214" width="30" height="6" rx="2" fill="#cbd5e1" />
    </g>

    <!-- Scan frame corners -->
    <path d="M 28 88 L 28 70 L 46 70" stroke="#2dd4bf" stroke-width="5" fill="none" stroke-linecap="round" />
    <path d="M 252 88 L 252 70 L 234 70" stroke="#2dd4bf" stroke-width="5" fill="none" stroke-linecap="round" />
    <path d="M 28 410 L 28 428 L 46 428" stroke="#2dd4bf" stroke-width="5" fill="none" stroke-linecap="round" />
    <path d="M 252 410 L 252 428 L 234 428" stroke="#2dd4bf" stroke-width="5" fill="none" stroke-linecap="round" />

    <!-- Capture button -->
    <circle cx="140" cy="465" r="32" fill="white" />
    <circle cx="140" cy="465" r="22" fill="#0d9488" />
  </g>
</svg>
